<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ストレスチェック | あなたの心の状態を知ろう</title>
  <meta name="description" content="15問の質問に答えるだけで、あなたの現在のストレスレベルを測定します。心の健康状態を把握し、適切なアドバイスを受けましょう。">
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="">
  <link href="./index_files/css2" rel="stylesheet">
  <link rel="stylesheet" href="./index_files/style.css">
</head>
<body>

  <!-- 背景装飾 -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="app-container">

    <!-- ===== スタート画面 ===== -->
    <section id="screen-start" class="screen active">
      <div class="card start-card">
        <div class="icon-wrap">
          <div class="pulse-ring"></div>
          <span class="icon-main">🧘</span>
        </div>
        <h1 class="title">ストレスチェック</h1>
        <p class="subtitle">あなたの心の状態を知ろう</p>
        <p class="description">
          15問の簡単な質問に答えるだけで、<br>
          あなたの現在のストレスレベルを測定します。<br>
          所要時間は約 <strong>2〜3分</strong> です。
        </p>
        <div class="features">
          <div class="feature-item">
            <span class="feature-icon">📋</span>
            <span>15問の質問</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">🔒</span>
            <span>データ保存なし</span>
          </div>
          <div class="feature-item">
            <span class="feature-icon">💡</span>
            <span>アドバイス付き</span>
          </div>
        </div>
        <button id="btn-start" class="btn btn-primary">チェックを始める</button>
        <p class="disclaimer">※ このチェックは医療診断ではありません。深刻な場合は専門家にご相談ください。</p>
      </div>
    </section>

    <!-- ===== 質問画面 ===== -->
    <section id="screen-question" class="screen">
      <div class="card question-card">
        <div class="progress-header">
          <span id="question-counter" class="counter-text">1 / 15</span>
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar" style="width: 6.67%"></div>
          </div>
        </div>

        <div id="question-area" class="question-area">
          <div class="question-number-badge" id="q-number-badge">Q1</div>
          <p id="question-text" class="question-text">質問テキストがここに入ります。</p>
        </div>

        <div class="options-grid" id="options-grid">
          <button class="option-btn" data-value="0" id="opt-0">
            <span class="option-icon">😊</span>
            <span class="option-label">全くない</span>
          </button>
          <button class="option-btn" data-value="1" id="opt-1">
            <span class="option-icon">🙂</span>
            <span class="option-label">たまにある</span>
          </button>
          <button class="option-btn" data-value="2" id="opt-2">
            <span class="option-icon">😟</span>
            <span class="option-label">よくある</span>
          </button>
          <button class="option-btn" data-value="3" id="opt-3">
            <span class="option-icon">😰</span>
            <span class="option-label">常にある</span>
          </button>
        </div>

        <div class="nav-buttons">
          <button id="btn-prev" class="btn btn-secondary" disabled="">← 前へ</button>
          <button id="btn-next" class="btn btn-primary" disabled="">次へ →</button>
        </div>
      </div>
    </section>

    <!-- ===== 結果画面 ===== -->
    <section id="screen-result" class="screen">
      <div class="card result-card">
        <div id="result-emoji" class="result-emoji">😊</div>
        <h2 id="result-level" class="result-level">ストレスレベル</h2>
        <div class="result-score-wrap">
          <div class="score-ring-container">
            <svg class="score-ring" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
              <circle id="ring-fill" class="ring-fill" cx="60" cy="60" r="50" stroke-dasharray="314" stroke-dashoffset="314"></circle>
            </svg>
            <div class="score-center">
              <span id="result-score-display" class="score-number">0</span>
              <span class="score-unit">/ 45</span>
            </div>
          </div>
        </div>
        <div id="result-badge" class="result-badge">低ストレス</div>
        <p id="result-message" class="result-message">結果メッセージ</p>
        <div id="result-advice" class="advice-box">
          <h3 class="advice-title">💡 アドバイス</h3>
          <ul id="advice-list" class="advice-list"></ul>
        </div>
        <div class="result-actions">
          <button id="btn-retry" class="btn btn-secondary">もう一度チェックする</button>
          <button id="btn-share" class="btn btn-primary">結果をシェアする</button>
        </div>
      </div>
    </section>

  </div><!-- /.app-container -->

  <script src="./index_files/script.js"></script>


</body></html>
